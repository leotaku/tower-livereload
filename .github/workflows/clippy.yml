name: clippy

on:
  pull_request:
  push:
    tags:
    branches:
      - master

permissions: {}

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - run: rustup toolchain install stable
      - run: cargo clippy -- --deny warnings
